# Full tier: nightly + on-demand. Installs the anvl/XLA stack from
# r-universe and runs the complete suite including jit-backed tests.
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

name: check-full

jobs:
  check-full:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_INSTALL: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
          extra-repositories: |
            https://hypertidy.r-universe.dev
            https://r-xla.r-universe.dev
            https://mlverse.r-universe.dev

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libprotobuf-dev protobuf-compiler libprotoc-dev

      - name: Cache PJRT CPU plugin
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/pjrt
          key: pjrt-cpu-${{ runner.os }}-v14.0.1

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
