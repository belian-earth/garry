# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PJRT_INSTALL: "1"          # let pjrt fetch the CPU plugin non-interactively

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      # garry's mosaic layer uses GDAL's GTI driver (>= 3.9). The distro/CRAN
      # default GDAL is older, so install a recent one BEFORE setup-r and rebuild
      # gdalraster against it below. Windows keeps its CRAN binary (already 3.9+).
      - name: Recent GDAL (macOS)
        if: runner.os == 'macOS'
        run: brew install gdal proj geos

      - name: Recent GDAL (Ubuntu, ubuntugis-unstable PPA)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntugis/ubuntugis-unstable
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libproj-dev libgeos-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          extra-repositories: https://r-xla.r-universe.dev

      - name: GDAL SRS source quirk (macOS)
        if: runner.os == 'macOS'
        run: echo "GTIFF_SRS_SOURCE=EPSG" >> $GITHUB_ENV

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Force a source build so gdalraster links the recent system GDAL above
      # (the binary from CRAN/P3M is compiled against an older one).
      - name: Rebuild gdalraster from source (macOS/Linux)
        if: runner.os != 'Windows'
        run: Rscript -e "install.packages('gdalraster', type = 'source', repos = 'https://cloud.r-project.org')"

      - name: Print GDAL version
        run: Rscript -e "cat('GDAL:', gdalraster::gdal_version()[[1]], '\n')"

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
