# Fast tier: every push/PR. Hard dependencies only (no anvl/XLA stack);
# anvl-dependent tests skip via skip_if_not_installed("anvl").
on:
  push:
    branches: [main]
  pull_request:

name: check-fast

jobs:
  check-fast:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r-version: ['release', 'devel']
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true
          extra-repositories: https://hypertidy.r-universe.dev

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::terra
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true
